<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EVO Traductor">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<title>EVO Traductor</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#000; color:#fff; font-family:'Segoe UI',system-ui,sans-serif; min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden; }
#splash { position:fixed; inset:0; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:999; animation: ocultarSplash 0.4s ease 1.8s forwards; }
@keyframes ocultarSplash { to { opacity:0; pointer-events:none; visibility:hidden; } }
#splash img { width:200px; }
.splash-line { width:44px; height:2px; background:#1a6b2f; }
.splash-sub { color:#2a7a40; font-size:10px; font-weight:700; letter-spacing:4px; text-transform:uppercase; }
.app { flex:1; display:flex; flex-direction:column; max-width:500px; width:100%; margin:0 auto; }
.logo-top { padding:24px 20px 0; display:flex; align-items:center; justify-content:center; }
.logo-top img { width:200px; }
.tabs { display:flex; border-bottom:1px solid #1a2e1e; flex-shrink:0; }
.tab { flex:1; padding:14px; text-align:center; font-size:12px; font-weight:700; color:#333; text-transform:uppercase; cursor:pointer; border-bottom:2px solid transparent; }
.tab.active { color:#1db954; border-bottom-color:#1a6b2f; }
.screen { flex:1; padding:20px 16px; display:flex; flex-direction:column; gap:12px; overflow-y:auto; }
.screen.hidden { display:none !important; }
.btn-primary { background:#000; border:1px solid #1f5c2e; border-radius:18px; padding:26px 22px; display:flex; align-items:center; gap:18px; cursor:pointer; position:relative; overflow:hidden; }
.btn-primary::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg,rgba(26,107,47,0.2),transparent 60%); pointer-events:none; }
.btn-primary:active { transform:scale(0.97); }
.btn-icon { width:54px; height:54px; background:#1a6b2f; border-radius:15px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.btn-icon svg { width:26px; height:26px; fill:none; stroke:#fff; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.btn-text { display:flex; flex-direction:column; gap:3px; z-index:1; }
.btn-label { font-size:18px; font-weight:800; color:#fff; }
.btn-sub { font-size:11px; color:#4a8a5a; }
.btn-secondary { background:#000; border:1px solid #181818; border-radius:13px; padding:15px 18px; display:flex; align-items:center; gap:14px; cursor:pointer; }
.btn-secondary:active { transform:scale(0.97); border-color:#1f5c2e; }
.btn-sec-icon { width:40px; height:40px; background:#0d0d0d; border:1px solid #1e1e1e; border-radius:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.btn-sec-icon svg { width:18px; height:18px; fill:none; stroke:#444; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
.btn-sec-label { font-size:14px; font-weight:700; color:#555; }
input[type="file"] { display:none; }
.foto-wrap { border-radius:14px; overflow:hidden; border:1px solid #1a2e1e; max-height:200px; background:#060606; display:flex; align-items:center; justify-content:center; }
.foto-wrap img { width:100%; max-height:200px; object-fit:contain; display:block; }
#loading { display:none; flex-direction:column; align-items:center; gap:14px; padding:24px; }
#loading.show { display:flex; }
.spinner { width:34px; height:34px; border:2px solid #111; border-top:2px solid #1a6b2f; border-radius:50%; animation:spin 0.7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text { font-size:12px; color:#2a7a40; font-weight:600; }
#cardResult { display:none; background:#060606; border:1px solid #1a2e1e; border-radius:14px; overflow:hidden; }
#cardResult.show { display:block; }
.card-header { padding:9px 14px; background:#080f0a; border-bottom:1px solid #1a2e1e; display:flex; align-items:center; gap:8px; }
.card-dot { width:6px; height:6px; background:#1db954; border-radius:50%; }
.card-htxt { font-size:10px; font-weight:800; color:#2a7a40; letter-spacing:2px; text-transform:uppercase; }
.card-body { padding:16px; font-size:14px; line-height:2; color:#ccc; white-space:pre-wrap; word-break:break-word; }
.card-body .f { color:#1db954; font-weight:700; }
#cardError { display:none; background:#0a0606; border:1px solid #3a1010; border-radius:14px; padding:14px 16px; font-size:13px; color:#854040; }
#cardError.show { display:block; }
.btns-row { display:flex; gap:10px; }
.btn-r1 { flex:1; background:#1a6b2f; border:none; border-radius:13px; padding:15px; color:#fff; font-size:13px; font-weight:800; cursor:pointer; }
.btn-r2 { flex:1; background:transparent; border:1px solid #1f5c2e; border-radius:13px; padding:15px; color:#2a7a40; font-size:13px; font-weight:800; cursor:pointer; }
.hist-toolbar { display:flex; gap:8px; }
.btn-export { flex:1; background:#1a6b2f; border:none; border-radius:12px; padding:13px; color:#fff; font-size:12px; font-weight:800; cursor:pointer; }
.btn-borrar { background:transparent; border:1px solid #3a1010; border-radius:12px; padding:13px 16px; color:#7a2020; font-size:12px; font-weight:800; cursor:pointer; }
.hist-empty { text-align:center; padding:40px 20px; color:#333; font-size:13px; line-height:1.8; }
.hist-grupo { background:#060606; border:1px solid #1a2e1e; border-radius:14px; overflow:hidden; }
.hist-grupo-header { padding:14px 16px; display:flex; align-items:center; gap:14px; cursor:pointer; }
.hist-badge { width:44px; height:44px; background:#1a6b2f; border-radius:12px; display:flex; align-items:center; justify-content:center; font-size:18px; font-weight:900; color:#fff; flex-shrink:0; }
.hist-badge.multi { background:#0d3d1f; font-size:14px; }
.hist-info { flex:1; min-width:0; }
.hist-modelo { font-size:13px; font-weight:800; color:#fff; }
.hist-color { font-size:11px; color:#4a8a5a; margin-top:2px; }
.hist-chev { color:#333; font-size:12px; flex-shrink:0; transition:transform 0.2s; }
.hist-chev.open { transform:rotate(90deg); }
.hist-chassis { display:none; border-top:1px solid #111; padding:12px 16px; background:#030303; }
.hist-chassis.open { display:block; }
.chassis-title { font-size:9px; color:#2a7a40; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.chassis-item { display:flex; align-items:center; justify-content:space-between; padding:4px 0; }
.chassis-num { font-size:11px; color:#666; font-family:monospace; }
.chassis-del { background:none; border:none; color:#333; font-size:14px; cursor:pointer; padding:2px 8px; }
.hist-gdel { background:none; border:none; color:#333; font-size:16px; cursor:pointer; padding:4px; flex-shrink:0; }
.modal-ov { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:1000; align-items:center; justify-content:center; padding:20px; }
.modal-ov.show { display:flex; }
.modal { background:#0d0d0d; border:1px solid #1a2e1e; border-radius:20px; padding:28px 24px; max-width:320px; width:100%; text-align:center; }
.modal h3 { font-size:16px; font-weight:800; color:#fff; margin:12px 0 8px; }
.modal p { font-size:13px; color:#555; line-height:1.6; margin-bottom:24px; }
.modal-btns { display:flex; gap:10px; }
.modal-cancel { flex:1; background:transparent; border:1px solid #222; border-radius:12px; padding:14px; color:#555; font-size:13px; font-weight:700; cursor:pointer; }
.modal-confirm { flex:1; background:#7a0000; border:none; border-radius:12px; padding:14px; color:#fff; font-size:13px; font-weight:800; cursor:pointer; }
.app-footer { padding:16px 0 24px; display:flex; flex-direction:column; align-items:center; gap:2px; flex-shrink:0; }
.footer-title { font-size:13px; font-weight:800; color:#1a1a1a; }
.footer-sub { font-size:9px; color:#151515; letter-spacing:2px; text-transform:uppercase; }
.toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(80px); background:#1a6b2f; color:#fff; padding:10px 26px; border-radius:30px; font-size:13px; font-weight:700; transition:transform 0.3s; z-index:998; pointer-events:none; }
.toast.show { transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="splash">
  <img src="logo.webp" alt="Evobike" onerror="this.style.display='none'">
  <div class="splash-line"></div>
  <span class="splash-sub">Traductor de Etiquetas</span>
</div>

<div class="app">
  <div class="logo-top">
    <img src="logo.webp" alt="Evobike" onerror="this.style.display='none'">
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('camara')">Camara</div>
    <div class="tab" onclick="showTab('historial')">Inventario</div>
  </div>

  <div class="screen" id="tabCamara">
    <div id="screenHome">
      <div class="btn-primary" onclick="document.getElementById('inputCamara').click()">
        <div class="btn-icon"><svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
        <div class="btn-text"><span class="btn-label">Tomar Foto</span><span class="btn-sub">Apunta a la etiqueta china</span></div>
      </div>
      <input type="file" id="inputCamara" accept="image/*" capture="environment" onchange="handleFile(this)">
      <div class="btn-secondary" onclick="document.getElementById('inputGaleria').click()">
        <div class="btn-sec-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div>
        <span class="btn-sec-label">Elegir de galeria</span>
      </div>
      <input type="file" id="inputGaleria" accept="image/*" onchange="handleFile(this)">
    </div>
    <div id="screenResult" style="display:none;flex-direction:column;gap:12px;">
      <div class="foto-wrap"><img id="previewImg" src="" alt="foto"></div>
      <div id="loading"><div class="spinner"></div><span class="loading-text">Traduciendo...</span></div>
      <div id="cardResult"><div class="card-header"><div class="card-dot"></div><span class="card-htxt">Traduccion</span></div><div class="card-body" id="cardBody"></div></div>
      <div id="cardError"></div>
      <div class="btns-row" id="btnsAccion" style="display:none;">
        <button class="btn-r1" onclick="nuevaFoto()">Nueva foto</button>
        <button class="btn-r2" onclick="copiar()">Copiar</button>
      </div>
    </div>
  </div>

  <div class="screen hidden" id="tabHistorial">
    <div class="hist-toolbar">
      <button class="btn-export" onclick="exportarPDF()">Exportar PDF</button>
      <button class="btn-borrar" onclick="confirmarBorrar()">Borrar todo</button>
    </div>
    <div id="histLista"></div>
  </div>

  <div class="app-footer">
    <span class="footer-title">EVO Traductor</span>
    <span class="footer-sub">Chino - Espanol</span>
  </div>
</div>

<div class="modal-ov" id="modalBorrar">
  <div class="modal">
    <div style="font-size:36px;">&#128465;</div>
    <h3>Borrar inventario?</h3>
    <p>Elimina todo el historial. No se puede deshacer.</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="modal-confirm" onclick="borrarHistorial()">Borrar todo</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>

// API via Netlify Function proxy
var textoFinal = '';

function cerrarSplash() {
  var s = document.getElementById('splash');
  if (!s) return;
  s.style.transition = 'opacity 0.4s';
  s.style.opacity = '0';
  s.style.pointerEvents = 'none';
  setTimeout(function() { s.style.display = 'none'; }, 400);
}
setTimeout(cerrarSplash, 1500);

function showTab(tab) {
  var tabs = document.querySelectorAll('.tab');
  tabs[0].classList.toggle('active', tab === 'camara');
  tabs[1].classList.toggle('active', tab === 'historial');
  document.getElementById('tabCamara').classList.toggle('hidden', tab !== 'camara');
  document.getElementById('tabHistorial').classList.toggle('hidden', tab !== 'historial');
  if (tab === 'historial') renderHistorial();
}

function handleFile(input) {
  var file = input.files[0];
  if (!file) return;
  input.value = '';
  
  // Forzar mime type valido para Claude
  var mime = file.type;
  if (!mime || mime === '' || mime === 'image/heic' || mime === 'image/heif') {
    mime = 'image/jpeg';
  }
  if (mime !== 'image/jpeg' && mime !== 'image/png' && mime !== 'image/gif' && mime !== 'image/webp') {
    mime = 'image/jpeg';
  }
  
  var reader = new FileReader();
  reader.onload = function(e) {
    document.getElementById('screenHome').style.display = 'none';
    var sr = document.getElementById('screenResult');
    sr.style.display = 'flex';
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('cardResult').classList.remove('show');
    document.getElementById('cardError').classList.remove('show');
    document.getElementById('btnsAccion').style.display = 'none';
    document.getElementById('loading').classList.add('show');
    textoFinal = '';
    // Usar el mime corregido, no el del data URL
    var base64 = e.target.result.split(',')[1];
    traducir(base64, mime);
  };
  reader.readAsDataURL(file);
}

function traducir(base64, mime) {
  fetch('/api/translate', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1024,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mime, data: base64 } },
          { type: 'text', text: 'Eres traductor de etiquetas de motos electricas chinas para EVOBIKE Argentina. Traduce TODO al espanol. NUNCA muestres chino. Respeta nombres de colores poeticos completos. Formato exacto, un campo por linea:\nModelo: [nombre]\nColor: [colores con /]\nChasis: [numero sin asteriscos]\nMotor: [numero]\nN Orden: [numero]\nFecha: [fecha]\nOmite campos que no aparezcan.' }
        ]
      }]
    })
  }).then(function(r) {
    return r.json();
  }).then(function(data) {
    if (data.content && data.content[0] && data.content[0].text) {
      mostrarResultado(data.content[0].text);
    } else {
      mostrarError((data.error && data.error.message) || 'No se pudo traducir.');
    }
  }).catch(function() {
    mostrarError('Sin conexion. Verifica el internet.');
  });
}

function parsear(texto, campo) {
  var lineas = texto.split('\n');
  for (var i = 0; i < lineas.length; i++) {
    // Limpiar negritas markdown **campo:** y espacios
    var linea = lineas[i].replace(/\*\*/g, '').trim();
    if (linea.toLowerCase().indexOf(campo.toLowerCase() + ':') === 0) {
      return linea.split(':').slice(1).join(':').trim();
    }
  }
  return '';
}

function mostrarResultado(texto) {
  document.getElementById('loading').classList.remove('show');
  textoFinal = texto;
  var html = texto.split('\n').map(function(line) {
    var linea = line.replace(/\*\*/g, '').trim();
    var idx = linea.indexOf(':');
    if (idx > 0 && idx < 35) {
      return '<span class="f">' + esc(linea.slice(0, idx + 1)) + '</span>' + esc(linea.slice(idx + 1));
    }
    return esc(linea);
  }).join('\n');
  document.getElementById('cardBody').innerHTML = html;
  document.getElementById('cardResult').classList.add('show');
  document.getElementById('btnsAccion').style.display = 'flex';
  guardarHistorial(texto);
}

function guardarHistorial(texto) {
  var modelo = parsear(texto, 'modelo');
  var color = parsear(texto, 'color');
  var chasis = parsear(texto, 'chasis');
  var motor = parsear(texto, 'motor');
  if (!modelo && !color) return;
  var key = (modelo + '|||' + color).toLowerCase();
  var hist = JSON.parse(localStorage.getItem('evo_hist') || '{}');
  if (!hist[key]) hist[key] = { modelo: modelo, color: color, unidades: [] };
  hist[key].unidades.push({
    chasis: chasis || 'Sin codigo',
    motor: motor || '',
    fecha: new Date().toLocaleDateString('es-AR')
  });
  localStorage.setItem('evo_hist', JSON.stringify(hist));
  mostrarToast('Guardado en inventario');
}

function sid(key) {
  return key.replace(/[^a-z0-9]/gi, '_');
}

function renderHistorial() {
  var hist = JSON.parse(localStorage.getItem('evo_hist') || '{}');
  var lista = document.getElementById('histLista');
  var keys = Object.keys(hist);
  if (keys.length === 0) {
    lista.innerHTML = '<div class="hist-empty">Sin registros.<br>Saca una foto para empezar.</div>';
    return;
  }
  keys.sort(function(a, b) { return hist[a].modelo.localeCompare(hist[b].modelo); });
  var out = '';
  for (var ki = 0; ki < keys.length; ki++) {
    var k = keys[ki];
    var h = hist[k];
    var n = h.unidades.length;
    var s = sid(k);
    var items = '';
    for (var ui = 0; ui < h.unidades.length; ui++) {
      var u = h.unidades[ui];
      var num = String(ui + 1).padStart(2, '0');
      var label = '#' + num + ' - ' + esc(u.chasis) + (u.motor ? ' | Motor: ' + esc(u.motor) : '') + ' (' + u.fecha + ')';
      items += '<div class="chassis-item">' +
        '<span class="chassis-num">' + label + '</span>' +
        '<button class="chassis-del" onclick="delUnidad(\'' + k.replace(/'/g, "\\'") + '\',' + ui + ')">x</button>' +
        '</div>';
    }
    var badgeClass = n > 1 ? 'hist-badge multi' : 'hist-badge';
    out += '<div class="hist-grupo">' +
      '<div class="hist-grupo-header" onclick="toggleG(\'' + s + '\')">' +
      '<div class="' + badgeClass + '">' + n + '</div>' +
      '<div class="hist-info">' +
        '<div class="hist-modelo">' + esc(h.modelo) + '</div>' +
        '<div class="hist-color">' + esc(h.color) + '</div>' +
      '</div>' +
      '<span class="hist-chev" id="chev-' + s + '">&#9658;</span>' +
      '<button class="hist-gdel" onclick="event.stopPropagation();delGrupo(\'' + k.replace(/'/g, "\\'") + '\')">x</button>' +
      '</div>' +
      '<div class="hist-chassis" id="ch-' + s + '">' +
        '<div class="chassis-title">Numeros de chasis</div>' +
        items +
      '</div>' +
    '</div>';
  }
  lista.innerHTML = out;
}

function toggleG(s) {
  var c = document.getElementById('ch-' + s);
  var v = document.getElementById('chev-' + s);
  if (c) { c.classList.toggle('open'); if (v) v.classList.toggle('open'); }
}

function delUnidad(key, idx) {
  var hist = JSON.parse(localStorage.getItem('evo_hist') || '{}');
  if (hist[key]) {
    hist[key].unidades.splice(idx, 1);
    if (hist[key].unidades.length === 0) delete hist[key];
  }
  localStorage.setItem('evo_hist', JSON.stringify(hist));
  renderHistorial();
}

function delGrupo(key) {
  var hist = JSON.parse(localStorage.getItem('evo_hist') || '{}');
  delete hist[key];
  localStorage.setItem('evo_hist', JSON.stringify(hist));
  renderHistorial();
}

function confirmarBorrar() { document.getElementById('modalBorrar').classList.add('show'); }
function cerrarModal() { document.getElementById('modalBorrar').classList.remove('show'); }
function borrarHistorial() {
  localStorage.removeItem('evo_hist');
  cerrarModal();
  renderHistorial();
  mostrarToast('Historial borrado');
}

function exportarPDF() {
  var hist = JSON.parse(localStorage.getItem('evo_hist') || '{}');
  var keys = Object.keys(hist);
  if (keys.length === 0) { mostrarToast('No hay datos'); return; }
  keys.sort(function(a, b) { return hist[a].modelo.localeCompare(hist[b].modelo); });
  var total = 0;
  for (var i = 0; i < keys.length; i++) total += hist[keys[i]].unidades.length;
  var fecha = new Date().toLocaleDateString('es-AR', { day: '2-digit', month: 'long', year: 'numeric' });
  var modelos = [];
  var filas = '';
  for (var ki = 0; ki < keys.length; ki++) {
    var k = keys[ki];
    var h = hist[k];
    var n = h.unidades.length;
    if (modelos.indexOf(h.modelo) === -1) modelos.push(h.modelo);
    filas += '<tr><td><span class="b">' + esc(h.modelo) + '</span></td><td>' + esc(h.color) + '</td><td class="c">' + n + '</td></tr>';
    for (var ui = 0; ui < h.unidades.length; ui++) {
      var u = h.unidades[ui];
      var num = String(ui + 1).padStart(2, '0');
      filas += '<tr><td></td><td style="padding:3px 14px 3px 28px;font-size:11px;color:#888;font-family:monospace;">' +
        '#' + num + ' - ' + esc(u.chasis) + (u.motor ? ' | Motor: ' + esc(u.motor) : '') + ' (' + u.fecha + ')' +
        '</td><td></td></tr>';
    }
  }
  var css = '*{margin:0;padding:0;box-sizing:border-box;}body{font-family:sans-serif;padding:32px;max-width:900px;margin:0 auto;}' +
    'img{height:40px;}.hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #1a6b2f;padding-bottom:20px;margin-bottom:20px;}' +
    '.hr{text-align:right;}.ht{font-size:20px;font-weight:900;}.hs{font-size:11px;color:#1a6b2f;font-weight:700;letter-spacing:2px;text-transform:uppercase;}' +

function nuevaFoto() {
  document.getElementById('screenResult').style.display = 'none';
  document.getElementById('screenHome').style.display = 'block';
  document.getElementById('loading').classList.remove('show');
  document.getElementById('cardResult').classList.remove('show');
  document.getElementById('cardError').classList.remove('show');
  textoFinal = '';
}

function copiar() {
  if (!textoFinal) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(textoFinal).then(function() { mostrarToast('Copiado'); });
  }
}

function mostrarError(msg) {
  document.getElementById('loading').classList.remove('show');
  var el = document.getElementById('cardError');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('btnsAccion').style.display = 'flex';
}

function mostrarToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2200);
}

function esc(s) {
  return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
